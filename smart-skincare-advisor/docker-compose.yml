version: "3.9"

services:
  skincare-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skincare-advisor
    image: skincare-advisor:latest
    ports:
      - "8001:8000"
    volumes:
      # Persist SQLite database between container restarts
      - db_data:/app/data
      # Mount source code for live updates
      - ./ml:/app/ml
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./dataset:/app/dataset
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  db_data:
    driver: local
